services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Anonymous volumes prevent host from overwriting container's node_modules and .next cache
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      # Bind to all interfaces so the dev server is reachable from the host
      - HOSTNAME=0.0.0.0
      - PORT=3000
    env_file:
      - path: .env.local
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
